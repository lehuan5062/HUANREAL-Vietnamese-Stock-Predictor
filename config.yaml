# Vietnamese T+2 Stock Predictor - configuration
# All knobs live here so the code stays declarative.

data:
  cache_dir: cache           # parquet cache root
  # Rolling history depth: a full re-fetch pulls the last N years from *today*,
  # recomputed each run (not a frozen calendar date), so the covered window
  # slides forward automatically over time.
  history_duration_years: 9
  exchanges: [HSX, HNX, UPCOM]
  # Bypass vnstock's client-side vnai quota (the guest-tier 20/min cap) by
  # calling the underlying public provider endpoint directly. vnstock only
  # automates access to public APIs you already have legitimate access to —
  # the cap is the library's sponsorship nudge, not the data provider's limit.
  bypass_vnai_quota: true
  # Our own politeness throttle, per source: calls are paced EVENLY at
  # window/cap seconds apart (e.g. 60/min = one call every 1.0s), not bursted.
  # With the bypass on, vnstock's 20/min guest cap no longer applies, so this
  # is the only limit — set vs the providers' real servers.
  # 60/min matches vnstock's Community tier. Env override: STOCKPREDICT_API_PER_MIN=10
  api_per_min: 60          # fixed calls/min ceiling for any source without an override
  api_per_min_overrides:   # per-source fixed rates
    VCI: 62                # VCI 429s aggressively; keep it conservative
    KBS: 130               # KBS has been the most reliable source so far
  # Fixed per-source cooldown (seconds) applied after ANY fetch failure on
  # that source — a confirmed 429, or anything else (timeout, reset,
  # transient outage); without SOME backoff on every failure a struggling
  # source would hot-loop the same failing endpoint. These rates and this
  # cooldown are FIXED: never adjusted automatically at runtime, nothing
  # persisted across sessions. Tune them here by hand. Neither VCI nor KBS
  # publish a Retry-After header or documented cooldown period, so there's
  # no provider value to anchor to — pick values that keep you under their
  # (unpublished) limits in practice.
  cooldown_seconds: 60         # default for any source without an override
  cooldown_seconds_overrides:  # per-source fixed cooldowns
    VCI: 120
    KBS: 60

universe:
  liquidity_filter:
    # vnstock returns prices in thousand-VND units, so all VND thresholds below
    # are also in thousand-VND. close >= 5 means 5,000 VND, adv >= 1_000_000
    # thousand-VND-shares means ~1B VND of daily traded value (~$40k).
    min_adv_vnd: 1_000_000       # per-day "active day" bar, in thousand-VND-shares (~1B VND)
    # Require the stock to clear min_adv_vnd on at least this many of the last
    # 20 trading days. Counting active days (instead of averaging) stops a
    # single block-trade spike from sneaking a mostly-dead stock through — the
    # average is fooled by one huge day, the count is not.
    min_adv_active_days: 20
    min_close_vnd: 5             # avoid penny stocks (5,000 VND)
    min_history_days: 250
    # Data-integrity gate (not a strategy knob): drop a candidate whose most
    # recent cached bar is more than this many business days older than the
    # pick date. A dormant/illiquid name whose cache ended months ago would
    # otherwise be scored on a stale close and that close silently recorded as
    # the entry price (VTS/DCH, July 2026). Generous vs. real holiday gaps.
    max_staleness_days: 5

features:
  rsi_period: 14
  macd: {fast: 12, slow: 26, signal: 9}
  momentum_windows: [5, 20]
  atr_period: 14
  volume_zscore_window: 20
  realized_vol_window: 20

strategy:
  # The rebound / mean-reversion strategy: filter to downtrend names, predict
  # days-to-recovery (N) and the profit at recovery (P), rank by P/N × recovery
  # probability, and hold until the position first turns profitable (flexible
  # exit — no fixed sell day).
  downtrend:
    # A candidate is "in a downtrend" (and therefore a rebound candidate) when
    # ALL enabled conditions hold. Loosen these to widen the candidate pool.
    mom20_max: 0.0           # require mom_20 < this (log-return; 0 = 20-day decline)
    high_prox_max: -0.05     # require close <= this fraction below the 20-day high
    rsi_floor: 10            # require rsi_14 >= this (excludes free-falling knives). 0 disables.
    rsi_ceil: 50             # require rsi_14 <= this (not already recovered hard)
  recovery:
    # "Profitable point" = first future day whose close beats entry by
    # (round-trip cost + profit_margin). See pricing.profit_threshold().
    profit_margin: 0.005     # extra return above fees to call a day "profitable"
    p_quantile: 0.75         # per-bucket P summary (0.75 = 75th percentile — slower, more realistic bounces)
    # Earliest tradable exit day (T+2 settlement: shares bought today can't be
    # sold until this many trading days later). A "recovery" cannot be labeled
    # before this day, since it isn't executable. See target.recovery_episode.
    settle_days: 2
    # Cap (trading days) on the historical recovery-labeling scan. NOT a trading
    # policy cap (the strategy holds until recovery) — it only bounds labeling so
    # it stays O(H) per symbol. Rows not recovered within it are right-censored.
    label_max_horizon: 250
    # There is no stop-loss and no time cap: the strategy holds each pick until
    # it recovers to the profit target. (Backtests showed a stop hurts this
    # mean-reversion bet, and the min_recovery_prob healthy filter is what keeps
    # chronic decliners out in the first place.)
    # Healthy-ticker gate: drop candidates whose estimated recovery probability
    # is below this. The estimate is dominated by the ticker's OWN historical
    # downtrend-recovery rate (chronic decliners ~0, reliable bouncers ~1), so
    # this screens out falling knives that would otherwise be held forever under
    # the no-stop / no-cap flexible exit. 0 disables. ~0.90 keeps only the most
    # reliable bouncers, reducing knife incidence at cost of lower pick count.
    min_recovery_prob: 0.95
    # A candidate uses its OWN recovery history once it has at least this many
    # downtrend rows; thinner tickers fall back to the RSI x drawdown bucket,
    # then to the pooled all-downtrend estimate.
    min_ticker_obs: 100
    # A state bucket must hold at least this many historical downtrend rows to be
    # trusted; thinner buckets fall back to the pooled all-downtrend estimate.
    min_bucket_obs: 50
    # Coarse state buckets the Kaplan-Meier recovery estimator conditions on.
    # A candidate's (RSI band x distance-below-high band) picks its bucket; the
    # estimator reads that bucket's historical recovery curve. Thin/empty
    # buckets fall back to the pooled (all-downtrend) curve.
    state_buckets:
      rsi_edges: [30, 40, 50]
      high_prox_edges: [-0.20, -0.10, -0.05]

backtest:
  start: "2020-01-01"
  train_window_years: 2
  oos_window_months: 6
  step_months: 6
  top_k: 5
  # round-trip cost in basis points — derived from `broker:` below
  # (ACBS default: 0.15% commission × 2 sides + 10% VAT on commission
  # + 0.10% PIT on sell ~= 43 bps). Override here only for sensitivity tests.
  cost_bps: 43

broker:
  # ACBS. All percentages are absolute (i.e. 0.15 means 0.15%, not 15%).
  commission_pct: 0.15        # per side
  vat_pct: 10                 # VAT on commission (10% in VN)
  pit_pct: 0.10               # personal income tax on the SELL transaction value
  min_fee_vnd: 0              # per-order minimum (ACBS online has none)
  # Pricing is per share; position sizing is left to the user. All fee and
  # net-P&L figures the pipeline reports are per-share, so the actionable
  # gate (rr / net) is size-invariant.

pricing:
  # How many picks to return. The program surfaces EXACTLY this many names —
  # the top `default_picks` downtrend candidates by rebound score (P/N ×
  # recovery_prob). Override per-run with `--picks N`.
  default_picks: 1
  # Overbought hard gate (RSI-only). Drop any candidate whose rsi_14 exceeds this
  # level before ranking. 0 disables (the downtrend filter already excludes
  # high-RSI names, so this is usually redundant and left off).
  overbought_rsi_max: 0
  # Per-exchange daily price-band limits (fractions) + tolerance, used to detect
  # ceiling-locked bars (a name that closed at its ceiling can't be bought next
  # session) and corporate-action glitches.
  ceiling_limits: {HSX: 0.07, HNX: 0.10, UPCOM: 0.15}
  ceiling_tol: 0.015
  # Corporate-action guard. A 1-day close-to-close move beyond the exchange band
  # is impossible without a corporate action (split / rights / special dividend);
  # the unadjusted feed then shows a phantom spike that poisons the features. A
  # ticker is dropped while such a band-break sits inside this lookback window.
  # Set to 0 to disable.
  corp_action_lookback: 20
  # Advisory position-size cap: suggested_max_units = max_participation_pct/100 ×
  # adv_vnd_20_in_VND / buy_price, so a position can be entered/exited without
  # dominating the tape. Purely informational. Set to 0 to disable.
  max_participation_pct: 1.0

modes:
  claude:
    news_weight: 0.10
  gemini:
    news_weight: 0.05

news:
  # These are STARTING POINTS, not an exhaustive list. The Claude interactive
  # plan and Gemini prompt both tell the LLM to use these to seed a search,
  # then go broader (WebSearch / google_search grounding) for any other
  # relevant Vietnamese press, sector reports, or macro coverage.
  vn_sources:
    baomoi:           "https://baomoi.com/tim-kiem/{symbol}.epi"
    google_news_vn:   "https://www.google.com/search?q=%22{symbol}%22+co+phieu+chung+khoan&tbm=nws"
    cafef:            "https://cafef.vn/tim-kiem.html?keywords={symbol}"
    vietstock:        "https://finance.vietstock.vn/{symbol}"
    vneconomy:        "https://vneconomy.vn/tim-kiem.htm?keyword={symbol}"
    ndh:              "https://ndh.vn/tim-kiem.html?keyword={symbol}"
    theinvestor:      "https://theinvestor.vn/?s={symbol}"
    tradingview:      "https://www.tradingview.com/symbols/HOSE-{symbol}/"
  # Macro / global context — read once per session, not per ticker.
  global_sources:
    baomoi_chungkhoan:      "https://baomoi.com/the-thao/chung-khoan.epi"
    vietstock_en:           "https://en.vietstock.vn/"
    google_news_vnindex:    "https://www.google.com/search?q=VN-Index+today&tbm=nws"
    google_news_vn_macro:   "https://www.google.com/search?q=Vietnam+stock+market+today&tbm=nws"
    reuters_asia:           "https://www.reuters.com/markets/asia/"
    bloomberg_markets:      "https://www.bloomberg.com/markets"
