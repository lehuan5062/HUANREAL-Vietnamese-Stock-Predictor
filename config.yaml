# Vietnamese stock predictor - configuration
#
# The program is 100% LLM-agent-driven now (no ML/DL, no coded scoring
# model). Only TRUE mechanical gates and data-plumbing knobs live here.
# Everything that used to be a judgment threshold (liquidity size,
# overbought RSI, downtrend shape, recovery-probability minimum, etc.) is
# now a plain data column the agent sees directly and reasons over itself
# — see selector.eligible_universe() and the mode plan markdown.

data:
  cache_dir: cache           # parquet cache root
  # Rolling history depth: a full re-fetch pulls the last N years from *today*,
  # recomputed each run (not a frozen calendar date), so the covered window
  # slides forward automatically over time.
  history_duration_years: 9
  exchanges: [HSX, HNX, UPCOM]
  # Bypass vnstock's client-side vnai quota (the guest-tier 20/min cap) by
  # calling the underlying public provider endpoint directly. vnstock only
  # automates access to public APIs you already have legitimate access to —
  # the cap is the library's sponsorship nudge, not the data provider's limit.
  bypass_vnai_quota: true
  # Our own politeness throttle, per source: calls are paced EVENLY at
  # window/cap seconds apart (e.g. 60/min = one call every 1.0s), not bursted.
  # With the bypass on, vnstock's 20/min guest cap no longer applies, so this
  # is the only limit — set vs the providers' real servers.
  # 60/min matches vnstock's Community tier. Env override: STOCKPREDICT_API_PER_MIN=10
  api_per_min: 60          # fixed calls/min ceiling for any source without an override
  api_per_min_overrides:   # per-source fixed rates
    VCI: 63                # VCI 429s aggressively; keep it conservative
    KBS: 170               # KBS has been the most reliable source so far
  # Fixed per-source cooldown (seconds) applied after ANY fetch failure on
  # that source — a confirmed 429, or anything else (timeout, reset,
  # transient outage); without SOME backoff on every failure a struggling
  # source would hot-loop the same failing endpoint. These rates and this
  # cooldown are FIXED: never adjusted automatically at runtime, nothing
  # persisted across sessions. Tune them here by hand. Neither VCI nor KBS
  # publish a Retry-After header or documented cooldown period, so there's
  # no provider value to anchor to — pick values that keep you under their
  # (unpublished) limits in practice.
  cooldown_seconds: 60         # default for any source without an override
  cooldown_seconds_overrides:  # per-source fixed cooldowns
    VCI: 120
    KBS: 60

universe:
  # Defines what counts as an "active" trading day for the informational
  # adv_active_days_20 column (traded value >= this bar, in thousand-VND —
  # vnstock prices are thousand-VND units). NOT a gate any more — the column
  # is handed to the LLM agent as plain data; it judges liquidity itself.
  active_day_vnd_threshold: 1_000_000
  liquidity_filter:
    # Data-integrity gate (not a strategy knob): drop a candidate whose most
    # recent cached bar is more than this many business days older than the
    # pick date. A dormant/illiquid name whose cache ended months ago would
    # otherwise be scored on a stale close and that close silently recorded as
    # the entry price (VTS/DCH, July 2026). Generous vs. real holiday gaps.
    # This is the ONE liquidity_filter key that remains a hard gate — size
    # (min_adv_vnd / min_adv_active_days / min_close_vnd / min_history_days)
    # is no longer a coded gate; the raw columns (adv_vnd_20,
    # adv_active_days_20, close, history_days) are handed to the LLM agent as
    # plain data and it judges tradability/size itself.
    max_staleness_days: 5

features:
  rsi_period: 14
  macd: {fast: 12, slow: 26, signal: 9}
  momentum_windows: [5, 20]
  atr_period: 14
  volume_zscore_window: 20
  realized_vol_window: 20

broker:
  # ACBS. All percentages are absolute (i.e. 0.15 means 0.15%, not 15%).
  commission_pct: 0.15        # per side
  vat_pct: 10                 # VAT on commission (10% in VN)
  pit_pct: 0.10               # personal income tax on the SELL transaction value
  min_fee_vnd: 0              # per-order minimum (ACBS online has none)
  # Pricing is per share; position sizing is left to the user. All fee and
  # net-P&L figures the pipeline reports are per-share, so the actionable
  # gate (rr / net) is size-invariant.

pricing:
  # How many picks to return. The program surfaces EXACTLY this many names.
  # Override per-run with `--picks N`.
  default_picks: 1
  # Momentum/rebound "profitable point" = round-trip cost + this margin (see
  # pricing.profit_threshold()). The LLM's predicted P must clear this bar or
  # the pick is flagged `below_recovery_bar` (weak edge).
  profit_margin: 0.005
  # Earliest tradable exit day (T+2 settlement: shares bought today can't be
  # sold until this many trading days later).
  settle_days: 2
  # Per-exchange daily price-band limits (fractions) + tolerance, used to detect
  # ceiling-locked bars (a name that closed at its ceiling can't be bought next
  # session) and corporate-action glitches. Hard-gate arithmetic, not a
  # judgment threshold.
  ceiling_limits: {HSX: 0.07, HNX: 0.10, UPCOM: 0.15}
  ceiling_tol: 0.015
  # Corporate-action guard. A 1-day close-to-close move beyond the exchange band
  # is impossible without a corporate action (split / rights / special dividend);
  # the unadjusted feed then shows a phantom spike that poisons the features. A
  # ticker is dropped while such a band-break sits inside this lookback window.
  # Set to 0 to disable.
  corp_action_lookback: 20

strategy:
  dividend:
    # How many years of dividend-event history the deterministic fetcher pulls
    # per symbol (data-plumbing, not a judgment threshold — the LLM decides
    # what counts as "enough" history when it sees years_paid_consecutive).
    history_years: 10
    # How many of the most recent payout years the yield-trend calculation
    # (payout_trend: rising/flat/declining) compares.
    trend_lookback_years: 3

news:
  # These are STARTING POINTS, not an exhaustive list. The agent prompt tells
  # the LLM to use these to seed a search, then go broader (WebSearch /
  # google_search grounding) for any other relevant Vietnamese press, sector
  # reports, or macro coverage.
  vn_sources:
    baomoi:           "https://baomoi.com/tim-kiem/{symbol}.epi"
    google_news_vn:   "https://www.google.com/search?q=%22{symbol}%22+co+phieu+chung+khoan&tbm=nws"
    cafef:            "https://cafef.vn/tim-kiem.html?keywords={symbol}"
    vietstock:        "https://finance.vietstock.vn/{symbol}"
    vneconomy:        "https://vneconomy.vn/tim-kiem.htm?keyword={symbol}"
    ndh:              "https://ndh.vn/tim-kiem.html?keyword={symbol}"
    theinvestor:      "https://theinvestor.vn/?s={symbol}"
    tradingview:      "https://www.tradingview.com/symbols/HOSE-{symbol}/"
  # Macro / global context — read once per session, not per ticker.
  global_sources:
    baomoi_chungkhoan:      "https://baomoi.com/the-thao/chung-khoan.epi"
    vietstock_en:           "https://en.vietstock.vn/"
    google_news_vnindex:    "https://www.google.com/search?q=VN-Index+today&tbm=nws"
    google_news_vn_macro:   "https://www.google.com/search?q=Vietnam+stock+market+today&tbm=nws"
    reuters_asia:           "https://www.reuters.com/markets/asia/"
    bloomberg_markets:      "https://www.bloomberg.com/markets"
