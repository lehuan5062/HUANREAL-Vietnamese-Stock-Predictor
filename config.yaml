# Vietnamese T+2 Stock Predictor - configuration
# All knobs live here so the code stays declarative.

data:
  source: VCI                # vnstock data source: VCI | TCBS | KBS
  cache_dir: cache           # parquet cache root
  history_start: "2018-01-01"
  fetch_workers: 6           # threads when bulk-fetching OHLCV
  fetch_delay_sec: 0.15      # polite delay per request
  exchanges: [HSX, HNX, UPCOM]
  # Rate limit for outbound API calls (sliding 60s window).
  # Vnstock guest tier = 20/min hard cap; staying well under reduces 429s.
  # Override at runtime via env: STOCKPREDICT_API_PER_MIN=10
  api_per_min: 12

universe:
  liquidity_filter:
    # vnstock returns prices in thousand-VND units, so all VND thresholds below
    # are also in thousand-VND. close >= 5 means 5,000 VND, adv >= 1_000_000
    # thousand-VND-shares means ~1B VND of daily traded value (~$40k).
    min_adv_vnd: 1_000_000       # per-day "active day" bar, in thousand-VND-shares (~1B VND)
    # Require the stock to clear min_adv_vnd on at least this many of the last
    # 20 trading days. Counting active days (instead of averaging) stops a
    # single block-trade spike from sneaking a mostly-dead stock through — the
    # average is fooled by one huge day, the count is not.
    min_adv_active_days: 15
    min_close_vnd: 5             # avoid penny stocks (5,000 VND)
    min_history_days: 250

features:
  rsi_period: 14
  macd: {fast: 12, slow: 26, signal: 9}
  momentum_windows: [5, 20]
  atr_period: 14
  volume_zscore_window: 20
  realized_vol_window: 20

target:
  # Horizon for the swing trade. T+2 close-to-close by default.
  # Switch entry to "next_open" if you plan to buy at T+1 open instead of T close.
  entry: close              # close | next_open
  exit_offset_days: 2       # T -> T+2

model:
  algorithm: lightgbm
  params:
    n_estimators: 400
    learning_rate: 0.03
    num_leaves: 31
    min_child_samples: 50
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    objective: regression
    verbose: -1
  ensemble_seeds: [11, 22, 33, 44, 55]
  early_stopping_rounds: 40
  validation_fraction: 0.15

backtest:
  start: "2020-01-01"
  train_window_years: 2
  oos_window_months: 6
  step_months: 6
  top_k: 5
  # round-trip cost in basis points — derived from `broker:` below
  # (ACBS default: 0.15% commission × 2 sides + 10% VAT on commission
  # + 0.10% PIT on sell ~= 43 bps). Override here only for sensitivity tests.
  cost_bps: 43

broker:
  name: ACBS
  # All percentages are absolute (i.e. 0.15 means 0.15%, not 15%).
  commission_pct: 0.15        # per side
  vat_pct: 10                 # VAT on commission (10% in VN)
  pit_pct: 0.10               # personal income tax on the SELL transaction value
  min_fee_vnd: 0              # per-order minimum (ACBS online has none)
  # Pricing is per share; position sizing is left to the user. All fee and
  # net-P&L figures the pipeline reports are per-share, so the actionable
  # gate (rr / net) is size-invariant.

pricing:
  # How wide to set the stop-loss, in multiples of ATR(14).
  # 1.0 = very tight (often stopped out by noise);
  # 1.5 = moderate; 2.0 = loose (expensive when wrong).
  stop_atr_mult: 1.5
  # Take-profit distance, in multiples of ATR(14). The reward leg is ATR-scaled
  # (like the stop) rather than derived from the model's tiny 2-day return
  # forecast. This is the fix for the "only one actionable pick" pathology: the
  # old target = close*(1+pred_mean) put reward on the scale of a ~0.1% forecast
  # while risk sat on a ~4% ATR stop, so rr_ratio was structurally ~0.2 and the
  # 0.8 gate was reachable ONLY by prediction outliers — which are almost always
  # split / corporate-action data glitches (hence low accuracy too). With an
  # ATR-scaled target, rr_ratio ≈ target_atr_mult / stop_atr_mult is controlled,
  # and selection comes from the directional edge gate below.
  target_atr_mult: 2.0
  # Minimum required net risk-reward (after fees) to flag a pick as actionable.
  # The CLI shows `actionable: True/False` based on this gate. With an ATR-scaled
  # target this is now a sanity floor (rr is ~target_atr_mult/stop_atr_mult);
  # the real selectivity is the directional edge gate (min_edge_over_cost).
  min_rr_ratio: 0.8
  # Directional edge gate. A pick is actionable only if the model's predicted
  # forward return clears this multiple of the round-trip cost (fees as a % of
  # entry, i.e. breakeven_pct). 1.0 = the forecast must at least beat breakeven;
  # higher = demand a stronger signal and surface fewer names. This is what
  # decides HOW MANY tickers are actionable now that rr no longer does.
  min_edge_over_cost: 1.0
  # Sanity guard against unadjusted split / corporate-action artifacts. The mean
  # head is a calibrated 2-day return predictor; a |forecast| above this fraction
  # is almost never a real signal — it's the model extrapolating a huge bounce
  # off a broken price (e.g. mom_20 ≈ -0.9 from a missed split). Such rows are
  # dropped from the candidate set before ranking/pricing. Set to 0 to disable.
  max_abs_pred_mean: 0.05
  # How many picks to return. The program always surfaces EXACTLY this many
  # names — it ranks the whole scored universe by pred_mean and keeps the top
  # `default_picks`, so the difficulty (the implicit edge cutoff) floats to
  # whatever admits exactly this count. Picks whose forecast is below the
  # break-even quality bar (pred_mean < min_edge_over_cost × breakeven_pct) are
  # still returned but flagged `below_breakeven` and counted in a warning.
  # Override per-run with `--picks N` / `-n N`.
  default_picks: 1
  # Quantile alpha used by the "low" head to predict the next-day dip
  # the user can place as a limit-buy. The low head computes, per ticker, the
  # alpha-th empirical quantile of that ticker's OWN recent next-day-low
  # returns. P(fill) ≈ alpha against the ticker's own recent dip distribution.
  #   0.25 = aggressive (deeper dip, ~25% fill, cheaper when filled)
  #   0.50 = median (fills ~half the time)
  #   0.75 = conservative (shallow dip, ~75% fill)
  # When no `models/low_latest.pkl` is present, the program falls back
  # to entry = today's close (the legacy behavior).
  entry_low_alpha: 0.40
  # Exclude names locked limit-up: a stock that closed at the daily ceiling
  # opens the next session with a buy queue and no sellers, so a limit-buy
  # can't fill (you "can't buy it for days"). Per-exchange daily price-band
  # limits (fractions); a bar is treated as a ceiling-lock when it closed at
  # its high AND the 1-day return is within `ceiling_tol` of the band (the
  # tolerance absorbs tick rounding, which shaves the realized ceiling gain a
  # bit below the nominal band).
  ceiling_limits: {HSX: 0.07, HNX: 0.10, UPCOM: 0.15}
  ceiling_tol: 0.015
  # Corporate-action guard. Vietnamese exchanges cap a single day's close-to-close
  # move at the band above (HOSE 7% / HNX 10% / UPCOM 15%), so any 1-day return
  # beyond the band is impossible without a corporate action (split, rights issue,
  # special dividend) — the unadjusted feed then shows a phantom crash/spike that
  # poisons mom_*/atr_14/rsi_14. A ticker is dropped from the candidate set while
  # a band-breaking move sits inside this lookback window (matches the longest
  # feature window, mom_20, so contamination is fully covered). Set to 0 to disable.
  corp_action_lookback: 20
  # Target number of observations the alpha-quantile should rest on in the tail.
  # The per-ticker trailing window auto-sizes to lookback =
  # clip(ceil(target_tail_obs / alpha), 30, 120) trading days, so a deeper alpha
  # automatically widens the window and the quantile estimate stays stable when
  # entry_low_alpha is retuned. Tickers with fewer than this many observations
  # fall back to the pooled (market-wide) alpha-quantile, then to entry = close.
  entry_low_target_tail_obs: 15
  # Advisory position-size cap, expressed as a participation rate against the
  # stock's 20-day average daily traded value (adv_vnd_20). The program suggests
  # suggested_max_units = max_participation_pct/100 * adv_vnd_20_in_VND / entry_vnd
  # so a position can be entered/exited without dominating the tape. Absolute
  # percent (1.0 means 1% of ADV). Purely informational — it does NOT affect the
  # actionable gate (which stays size-invariant). When adv_vnd_20 is missing the
  # cap column is left null. Set to 0 to disable the suggestion entirely.
  max_participation_pct: 1.0

modes:
  claude:
    news_weight: 0.10
  gemini:
    news_weight: 0.05

news:
  # These are STARTING POINTS, not an exhaustive list. The Claude interactive
  # plan and Gemini prompt both tell the LLM to use these to seed a search,
  # then go broader (WebSearch / google_search grounding) for any other
  # relevant Vietnamese press, sector reports, or macro coverage.
  vn_sources:
    baomoi:           "https://baomoi.com/tim-kiem/{symbol}.epi"
    google_news_vn:   "https://www.google.com/search?q=%22{symbol}%22+co+phieu+chung+khoan&tbm=nws"
    cafef:            "https://cafef.vn/tim-kiem.html?keywords={symbol}"
    vietstock:        "https://finance.vietstock.vn/{symbol}"
    vneconomy:        "https://vneconomy.vn/tim-kiem.htm?keyword={symbol}"
    ndh:              "https://ndh.vn/tim-kiem.html?keyword={symbol}"
    theinvestor:      "https://theinvestor.vn/?s={symbol}"
    tradingview:      "https://www.tradingview.com/symbols/HOSE-{symbol}/"
  # Macro / global context — read once per session, not per ticker.
  global_sources:
    baomoi_chungkhoan:      "https://baomoi.com/the-thao/chung-khoan.epi"
    vietstock_en:           "https://en.vietstock.vn/"
    google_news_vnindex:    "https://www.google.com/search?q=VN-Index+today&tbm=nws"
    google_news_vn_macro:   "https://www.google.com/search?q=Vietnam+stock+market+today&tbm=nws"
    reuters_asia:           "https://www.reuters.com/markets/asia/"
    bloomberg_markets:      "https://www.bloomberg.com/markets"
